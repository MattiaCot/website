<!DOCTYPE html>
<html lang="it">
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My web page</title>
    <script>
      (function () {
        const isDarkMode = localStorage.getItem('darkMode') === 'enabled';
        document.documentElement.classList.toggle('dark-mode', isDarkMode);
        document.documentElement.style.colorScheme = isDarkMode ? 'dark' : 'light';
      })();
    </script>
    <link rel="icon" type="image/x-icon" href="https://mattiacot.github.io/website/images/favicon.ico">
    <link href="css/index.css" rel="stylesheet">
</head>
<body class="page-shell">

  <div id="navbar-placeholder"></div>

  <h1 class="page-title">Benvenuti nel mio mondo</h1>
  <p>“I Monti sono maestri muti e fanno discepoli silenziosi.”<br>
      -Johann Wolfgang von Goethe.
  </p>
  <img src="images/img1.jpg" alt="image" title="prova" width="auto" height="209">
  
  

  <script>
    fetch('navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar-placeholder').innerHTML = html;
        if (window.initializeThemeToggle) {
          window.initializeThemeToggle();
        }
      });
  </script>
  <script src="scripts/script-nav.js"></script>
  <script src="scripts/theme-toggle.js"></script>
</body>
</html>
