<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <script>
    (function () {
      const isDarkMode = localStorage.getItem('darkMode') === 'enabled';
      document.documentElement.classList.toggle('dark-mode', isDarkMode);
      document.documentElement.style.colorScheme = isDarkMode ? 'dark' : 'light';
    })();
  </script>
  <link rel="icon" type="image/x-icon" href="https://mattiacot.github.io/website/images/favicon.ico">
  <link href="css/index.css" rel="stylesheet">
  <style>
    body {
      background-color: var(--main-bg-color);
      color: var(--main-text-color);
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 20px 0;
    }
    #score-board {
      font-size: 1.5em;
      margin-bottom: 10px;
      color: var(--nav-active-bg-color);
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }
    canvas {
      background: #222;
      border: 2px solid var(--nav-active-bg-color);
      display: block;
      margin: 0 auto;
    }
    #game-over-menu {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      color: white;
      font-size: 2em;
      pointer-events: none;
      border-radius: 8px;
    }
    #game-over-menu > * {
      pointer-events: auto;
    }
    #game-over-menu button {
      margin-top: 20px;
      padding: 10px 30px;
      font-size: 1em;
      background: var(--nav-active-bg-color);
      color: var(--nav-active-color);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #game-over-menu button:hover {
      background: var(--nav-active-hover-bg-color);
      color: var(--nav-active-hover-color);
    }
  </style>
</head>
<body class="snake-page">
  <div id="navbar-placeholder"></div>
  <div id="game-container">
    <div id="score-board">Punteggio: 0</div>
    <canvas id="game" width="400" height="400"></canvas>
    <div id="game-over-menu">
      <div id="game-over-text">Premi Start</div>
      <button id="overlay-button" onclick="startGame()">Start</button>
    </div>
  </div>
  <script>
    fetch('navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar-placeholder').innerHTML = html;
        if (window.initializeThemeToggle) {
          window.initializeThemeToggle();
        }
      });
  </script>
  <script src="scripts/script-nav.js"></script>
  <script src="scripts/theme-toggle.js"></script>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const grid = 20;
    let count = 0;
    let snake, dx, dy, apple, score, gameOver;
    let animationId;
    let gameStarted = false;

    function updateScore() {
      document.getElementById('score-board').textContent = `Punteggio: ${score}`;
    }

    function showOverlay(message, buttonText) {
      document.getElementById('game-over-text').textContent = message;
      document.getElementById('overlay-button').textContent = buttonText;
      document.getElementById('game-over-menu').style.display = 'flex';
    }

    function hideOverlay() {
      document.getElementById('game-over-menu').style.display = 'none';
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'red';
      ctx.fillRect(apple.x, apple.y, grid - 2, grid - 2);

      ctx.fillStyle = 'lime';
      snake.forEach(cell => ctx.fillRect(cell.x, cell.y, grid - 2, grid - 2));
    }

    function initGame() {
      snake = [{x:160, y:160}];
      dx = grid;
      dy = 0;
      apple = {x: 320, y: 320};
      score = 0;
      gameOver = false;
      count = 0;
      hideOverlay();
      updateScore();
      if (animationId) cancelAnimationFrame(animationId);
      if (!gameStarted) return;
      drawBoard();
      animationId = requestAnimationFrame(gameLoop);
    }

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function gameLoop() {
      animationId = requestAnimationFrame(gameLoop);
      if (++count < 5) return;
      count = 0;
      ctx.clearRect(0,0,canvas.width,canvas.height);

      // Move snake
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      snake.unshift(head);

      // Eat apple
      if (head.x === apple.x && head.y === apple.y) {
        score++;
        updateScore();
        apple.x = getRandomInt(0, 20) * grid;
        apple.y = getRandomInt(0, 20) * grid;
      } else {
        snake.pop();
      }

      drawBoard();

      // Check collision
      if (
        head.x < 0 || head.y < 0 ||
        head.x >= canvas.width || head.y >= canvas.height ||
        snake.slice(1).some(c => c.x === head.x && c.y === head.y)
      ) {
        showGameOver();
      }
    }

    function showGameOver() {
      gameOver = true;
      gameStarted = false;
      cancelAnimationFrame(animationId);
      showOverlay(`Game Over! Punteggio: ${score}`, 'Ricomincia');
    }

    function startGame() {
      gameStarted = true;
      initGame();
    }

    document.addEventListener("keydown", e => {
      if (!gameStarted || gameOver) return;
      if (e.key === "ArrowLeft" && dx === 0) {dx = -grid; dy = 0;}
      else if (e.key === "ArrowUp" && dy === 0) {dy = -grid; dx = 0;}
      else if (e.key === "ArrowRight" && dx === 0) {dx = grid; dy = 0;}
      else if (e.key === "ArrowDown" && dy === 0) {dy = grid; dx = 0;}
    });

    showOverlay('Premi Start', 'Start');
  </script>
</body>
</html>
